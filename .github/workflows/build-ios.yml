name: Build iOS IPA

on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'ios/**'
      - '.github/workflows/build-ios.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Inspect build output
        run: |
          echo "=== build/ios/iphoneos/ ==="
          ls -la build/ios/iphoneos/ || echo "DIR MISSING"
          echo "=== Runner.app top level ==="
          ls -la build/ios/iphoneos/Runner.app/ 2>/dev/null | head -30 || echo "Runner.app MISSING"
          echo "=== Runner.app/Frameworks ==="
          ls -la build/ios/iphoneos/Runner.app/Frameworks/ 2>/dev/null | head -20 || echo "No Frameworks dir"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -ry nota-ios.ipa Payload
          ls -lh nota-ios.ipa
          echo "=== ipa contents ==="
          unzip -l nota-ios.ipa | head -30

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: nota-ios-ipa
          path: nota-ios.ipa
          retention-days: 14

      - name: Upload Runner.app (debug)
        uses: actions/upload-artifact@v4
        with:
          name: runner-app-debug
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build/ios/logs/*.log
            /Users/runner/.cocoapods/logs/*.log
          if-no-files-found: ignore
          retention-days: 7
